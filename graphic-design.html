  <script>
    /* Only set <base> when this HTML is served under a subpath (e.g. /portfolio-website/...).
       Skip file:// and skip when already at site root so relative assets/... resolve like the live site. */
    (function () {
      if (!/^https?:$/i.test(location.protocol)) return;
      var p = location.pathname;
      if (!p || p === '/') return;
      var dir;
      if (p.endsWith('/')) {
        dir = p;
      } else {
        var last = p.split('/').pop() || '';
        if (last.indexOf('.') !== -1) {
          dir = p.replace(/[^/]+$/, '');
        } else {
          dir = p + '/';
        }
      }
      if (!dir || dir === '/') return;
      var el = document.createElement('base');
      el.href = new URL(dir, location.origin).href;
      document.head.insertBefore(el, document.head.firstChild);
    })();
  </script>

  <script>
    const filterBtns = document.querySelectorAll('.filter-btn');
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const cat = btn.dataset.category;
        galleryItems.forEach(item => {
          item.classList.toggle('hidden', cat !== 'all' && item.dataset.category !== cat);
        });
      });
    });

    const lightboxVideo = document.getElementById('lightboxVideo');
    galleryItems.forEach(item => {
      const img = item.querySelector('img');
      const video = item.querySelector('video');
      if (img) {
        item.addEventListener('dblclick', () => {
          lightboxImg.style.display = 'block';
          lightboxVideo.style.display = 'none';
          lightboxVideo.pause();
          lightboxVideo.removeAttribute('src');
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt;
          lightbox.classList.add('open');
        });
      } else if (video) {
        item.addEventListener('dblclick', () => {
          lightboxImg.style.display = 'none';
          lightboxVideo.style.display = 'block';
          lightboxVideo.src = video.src;
          lightboxVideo.play();
          lightbox.classList.add('open');
        });
      }
    });

    lightboxClose.addEventListener('click', () => {
      lightbox.classList.remove('open');
      lightboxVideo.pause();
      lightboxVideo.removeAttribute('src');
    });
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        lightbox.classList.remove('open');
        lightboxVideo.pause();
        lightboxVideo.removeAttribute('src');
      }
    });
    document.querySelectorAll('.gallery-item video').forEach(v => {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => { entry.target[entry.isIntersecting ? 'play' : 'pause'](); });
      }, { threshold: 0.25 });
      obs.observe(v);
    });
  </script>
